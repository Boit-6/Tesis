# docker-compose — entorno local del CRM (n8n + Gotenberg)
# Levanta ambos servicios en la MISMA red para que n8n alcance a Gotenberg
# por nombre de host (http://gotenberg:3000). La red bridge por defecto NO
# resuelve por nombre, por eso definimos una red propia (crm-net).
#
# Uso:  docker compose up -d
# n8n  → http://localhost:5678
#
# La base de datos NO está acá: vive en Supabase (PostgreSQL gestionado).

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      # URL pública con la que n8n se anuncia a sí mismo. En local queda en
      # localhost; para producción/demo poné N8N_PUBLIC_URL (ej. la URL https
      # de ngrok, con la barra final) en un archivo .env junto a este compose
      # — está gitignoreado, así la URL descartable no va al repo.
      - WEBHOOK_URL=${N8N_PUBLIC_URL:-http://localhost:5678/}
      - GENERIC_TIMEZONE=America/Argentina/Buenos_Aires
      - TZ=America/Argentina/Buenos_Aires
      # N8N_ENCRYPTION_KEY se OMITE a propósito: n8n toma la key que ya está
      # guardada dentro del volumen n8n_data (la que encriptó tus credenciales).
      # Si la seteás acá con un valor distinto, las credenciales dejan de desencriptar.
      # Variables reusables del workflow (poné los valores en el .env junto a este compose).
      # Así el chatId de Telegram y el database_id de Notion NO se hardcodean en cada nodo
      # y sobreviven a los re-imports del workflow.
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID:-}
      # Permite leer $env dentro de los nodos Code (necesario para NOTION_DATABASE_ID)
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - crm-net
    depends_on:
      - gotenberg

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: gotenberg
    restart: unless-stopped
    # No expone puerto al host: solo n8n lo consume por la red interna.
    networks:
      - crm-net

volumes:
  # Volumen preexistente con tus credenciales/workflows (creado fuera de este compose).
  # external: usa el volumen "n8n_data" tal cual, sin prefijo del proyecto.
  n8n_data:
    external: true

networks:
  crm-net:
    driver: bridge
